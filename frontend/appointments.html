<script>
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
}
</script>
<!DOCTYPE html>
<html>
<head>
    <title>Appointments</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="navbar">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="doctors.html">👨‍⚕️ Doctors</a>
    <a href="patients.html">🧑‍🤝‍🧑 Patients</a>
    <a href="appointments.html" class="active">📅 Appointments</a>
    <a href="login.html" class="logout-btn" onclick="logout()">🚪 Logout</a>
</div>
<hr>
<div id="appointmentFormContainer">
<h2>Book Appointment</h2>
<div class="form-row">
   <select id="patient">
    <option value="">Select Patient</option>
</select>
    <select id="doctor">
    <option value="">Select Doctor</option>
</select>
    <input type="date" id="date">
    <input type="time" id="time">
    <button id="addAppointmentBtn" onclick="addAppointment()">Book</button>
</div>
</div>

<h2>Appointments List</h2>
<table border="1" id="appointmentTable">
    <thead>
        <tr>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Date</th>
            <th>Time</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
let role = localStorage.getItem("role");
function loadPatientsDropdown() {
    fetch("http://127.0.0.1:5000/patients")
    .then(res => res.json())
    .then(data => {
        let select = document.getElementById("patient");

        // ✅ Add placeholder FIRST
        select.innerHTML = '<option value="" disabled selected>Select Patient</option>';

        // ✅ Add patients
        data.forEach(p => {
            let option = document.createElement("option");
            option.value = p.id;
            option.text = p.name;
            select.appendChild(option);
        });

        // ✅ Reset fields (ONLY ONCE, not inside loop)
        document.getElementById("date").value = "";
        document.getElementById("time").value = "";
        document.getElementById("doctor").selectedIndex = 0;
    });
}

function loadDoctorsDropdown() {
    fetch("http://127.0.0.1:5000/doctors")
    .then(res => res.json())
    .then(data => {
        let select = document.getElementById("doctor");

        select.innerHTML = '<option value="" disabled selected>Select Doctor</option>';

        data.forEach(d => {
            let option = document.createElement("option");
            option.value = d.id;
            option.text = d.name;
            select.appendChild(option);
        });
    });
}
function addAppointment() {
    let url = "http://127.0.0.1:5000/appointments";
    let method = "POST";

    if (window.currentEditId) {
        url += "/" + window.currentEditId;
        method = "PUT";
    }

    fetch(url, {
        method: method,
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            patient_id: document.getElementById("patient").value,
            doctor_id: document.getElementById("doctor").value,
            date: document.getElementById("date").value,
            time: document.getElementById("time").value
        })
    })
    .then(() => {
        window.currentEditId = null;
        loadAppointments();
    });
}

function loadAppointments() {
    fetch("http://127.0.0.1:5000/appointments")
    .then(res => res.json())
    .then(data => {
        let table = document.querySelector("#appointmentTable tbody");
        table.innerHTML = "";

        let role = localStorage.getItem("role");

        data.forEach(a => {
            let actionButtons = "";

            if (role !== "guest") {
                actionButtons = `
                    <button onclick="editAppointment(${a.id})">Edit</button>
                    <button onclick="deleteAppointment(${a.id})">Delete</button>
                `;
            }

            let row = `
                <tr>
                    <td>${a.patient}</td>
                    <td>${a.doctor}</td>
                    <td>${a.date}</td>
                    <td>${a.time}</td>
                    <td>${actionButtons}</td>
                </tr>
            `;

            table.innerHTML += row;
        });
    });
}
function editAppointment(id, date, time) {
    document.getElementById("date").value = date;
    document.getElementById("time").value = time;

    window.currentEditId = id;
}

function deleteAppointment(id) {
    fetch(`http://127.0.0.1:5000/appointments/${id}`, {
        method: "DELETE"
    })
    .then(() => loadAppointments());
}
function logout() {
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}
loadAppointments();
loadPatientsDropdown();
loadDoctorsDropdown();
</script>
<script>
     if (localStorage.getItem("role") === "guest") {
    document.getElementById("addAppointmentBtn").style.display = "none";
    }
</script>
<script>
    if (role === "guest") {
    document.getElementById("appointmentFormContainer").style.display = "none";
    }
</script>
</body>
</html>
