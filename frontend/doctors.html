<script>
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
}
</script>
<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="navbar">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="doctors.html" class="active">👨‍⚕️ Doctors</a>
    <a href="patients.html">🧑‍🤝‍🧑 Patients</a>
    <a href="appointments.html">📅 Appointments</a>
    <a href="login.html" class="logout-btn" onclick="logout()">🚪 Logout</a>
</div>
<hr>
<h2 id="doctorTitle">Add Doctor</h2>

<div class="top-bar">

    <!-- ✅ ONLY FORM WRAPPED -->
    <div id="doctorFormContainer">
        <div class="form-section">
            <input type="text" id="name" placeholder="Name">
            <input type="text" id="specialization" placeholder="Specialization">
            <input type="number" id="fees" placeholder="Fees">
            <button id="addDoctorBtn" onclick="addDoctor()">Add Doctor</button>
        </div>
    </div>

    <!-- ✅ KEEP THIS OUTSIDE -->
    <div class="search-section">
        <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" id="search" placeholder="Search doctor...">
        </div>

        <select id="filter" onchange="filterDoctor()">
            <option value="">All Specializations</option>
            <option value="Cardiologist">Cardiologist</option>
            <option value="General Physician">General Physician</option>
        </select>
    </div>

</div> 
<h2>Doctor List</h2>
<table border="1" id="doctorTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Specialization</th>
            <th>Fees</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
let role = localStorage.getItem("role");
function addDoctor() {
    let url = "http://127.0.0.1:5000/doctors";
    let method = "POST";

    if (window.currentEditId) {
        url += "/" + window.currentEditId;
        method = "PUT";
    }
    fetch(url, {
        method: method,
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: document.getElementById("name").value,
            specialization: document.getElementById("specialization").value,
            fees: document.getElementById("fees").value
        })
    })
    .then(() => {
        window.currentEditId = null;
        loadDoctors();
    });
}

function loadDoctors() {
    fetch("http://127.0.0.1:5000/doctors")
    .then(res => res.json())
    .then(data => {
        let table = document.querySelector("#doctorTable tbody");
        table.innerHTML = "";

        let role = localStorage.getItem("role");

        data.forEach(d => {
            let actionButtons = "";

            if (role !== "guest") {
                actionButtons = `
                    <button onclick="editDoctor(${d.id}, '${d.name}', '${d.specialization}')">Edit</button>
                    <button onclick="deleteDoctor(${d.id})">Delete</button>
                `;
            }

            let row = `
                <tr>
                    <td>${d.name}</td>
                    <td>${d.specialization}</td>
                    <td>${actionButtons}</td>
                </tr>
            `;

            table.innerHTML += row;
        });
    });
}

function editDoctor(id, name, specialization, fees) {
    document.getElementById("name").value = name;
    document.getElementById("specialization").value = specialization;
    document.getElementById("fees").value = fees;

    window.currentEditId = id;
}

function deleteDoctor(id) {
    fetch(`http://127.0.0.1:5000/doctors/${id}`, {
        method: "DELETE"
    })
    .then(() => loadDoctors());
}
function searchDoctor() {
    let searchValue = document.getElementById("search").value.toLowerCase();
    let filterValue = document.getElementById("filter").value.toLowerCase();

    let rows = document.querySelectorAll("#doctorTable tbody tr");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();

        let matchesSearch = text.includes(searchValue);
        let matchesFilter = filterValue === "" || text.includes(filterValue);

        row.style.display = (matchesSearch && matchesFilter) ? "" : "none";
    });
}
function filterDoctor() {
    searchDoctor(); // reuse same logic
}

function logout() {
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}

// Load on start
loadDoctors();
</script>
<script>
    if (localStorage.getItem("role") === "guest") {
    document.getElementById("addDoctorBtn").style.display = "none";
    }
</script>
<script>


if (role === "guest") {
    document.getElementById("doctorFormContainer").style.display = "none";
    document.getElementById("doctorTitle").style.display = "none";
}
</script>
</body>
</html>
